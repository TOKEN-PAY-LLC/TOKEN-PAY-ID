# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_auth:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;

server {
    listen 80;
    server_name tokenpay.space www.tokenpay.space auth.tokenpay.space id.tokenpay.space _;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name tokenpay.space www.tokenpay.space auth.tokenpay.space id.tokenpay.space _;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 5m;

    # Security headers (applied to all responses unless overridden in nested locations)
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: http:; connect-src 'self' https://ipapi.co; frame-ancestors 'self' https://*.tokenpay.space" always;
    add_header X-Download-Options noopen always;
    add_header X-Permitted-Cross-Domain-Policies none always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(self)" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Frontend static files
    location / {
        root /usr/share/nginx/html;
        index index.html;

        # Redirect .html URLs to clean URLs (only for actual client requests, not internal rewrites)
        if ($request_uri ~ ^/(.+)\.html(\?.*)?$) {
            return 301 /$1$2;
        }

        try_files $uri $uri.html $uri/ /index.html;
    }

    # Cache static assets (inherits security headers from server block — no add_header here)
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 7d;
        add_header Cache-Control "public, immutable" always;
        # MUST repeat security headers — nginx drops parent add_header in nested locations
        add_header X-Content-Type-Options nosniff always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header X-Permitted-Cross-Domain-Policies none always;
    }

    # SDK / Widget files — scoped to only widget JS files, not all frontend
    location = /sdk/tpid-auth.js {
        alias /usr/share/nginx/html/oauth-widget.js;
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Content-Type "application/javascript; charset=utf-8" always;
        add_header X-Content-Type-Options nosniff always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
    }

    location = /sdk/tpid-widget.js {
        alias /usr/share/nginx/html/tpid-widget.js;
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Content-Type "application/javascript; charset=utf-8" always;
        add_header X-Content-Type-Options nosniff always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
    }

    # Backward-compatible widget path (old: /tpid-widget.js, new: /sdk/tpid-widget.js)
    location = /tpid-widget.js {
        alias /usr/share/nginx/html/tpid-widget.js;
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Content-Type "application/javascript; charset=utf-8" always;
        add_header X-Content-Type-Options nosniff always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
    }

    # Block any other /sdk/ paths (was previously aliasing all frontend files)
    location /sdk/ {
        return 404;
    }

    # OpenID Connect discovery
    location /.well-known/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API auth endpoints — stricter rate limit
    location ~ ^/api/v1/auth/ {
        limit_req zone=api_auth burst=20 nodelay;
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

    # API proxy
    location /api/ {
        limit_req zone=api_general burst=50 nodelay;
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

    # Health check
    location /health {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
