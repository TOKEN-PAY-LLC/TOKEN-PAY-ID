<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>TOKEN PAY ID — QR Login</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico?v=6">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png?v=6">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png?v=6">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=6">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="theme-init.js?v=20260327b"></script>
    <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#000;color:#fff;font-family:'Comfortaa',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
    body.light{background:#f5f5f7;color:#111}
    .qr-box{text-align:center;max-width:380px;width:90%;padding:40px 24px}
    .qr-logo{height:20px;margin-bottom:32px;opacity:.7}
    body.light .qr-logo{filter:brightness(0)}
    .qr-icon{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
    body.light .qr-icon{background:rgba(0,0,0,.03);border-color:rgba(0,0,0,.08)}
    .qr-icon svg{width:28px;height:28px;color:rgba(255,255,255,.6)}
    body.light .qr-icon svg{color:rgba(0,0,0,.4)}
    .qr-title{font-size:1.1rem;font-weight:700;margin-bottom:8px}
    .qr-desc{font-size:.78rem;color:rgba(255,255,255,.4);margin-bottom:28px;line-height:1.5}
    body.light .qr-desc{color:rgba(0,0,0,.4)}
    .qr-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 32px;border-radius:50px;font-family:inherit;font-size:.82rem;font-weight:700;cursor:pointer;transition:all .2s;border:none;width:100%}
    .qr-btn-confirm{background:#fff;color:#000}
    .qr-btn-confirm:hover{background:#e8e8e8;transform:translateY(-1px)}
    body.light .qr-btn-confirm{background:#111;color:#fff}
    body.light .qr-btn-confirm:hover{background:#222}
    .qr-btn-cancel{background:transparent;color:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.1);margin-top:10px}
    .qr-btn-cancel:hover{color:rgba(255,255,255,.6);border-color:rgba(255,255,255,.2)}
    body.light .qr-btn-cancel{color:rgba(0,0,0,.4);border-color:rgba(0,0,0,.1)}
    body.light .qr-btn-cancel:hover{color:rgba(0,0,0,.6);border-color:rgba(0,0,0,.2)}
    .qr-status{font-size:.78rem;margin-top:16px;color:rgba(255,255,255,.4)}
    body.light .qr-status{color:rgba(0,0,0,.4)}
    .qr-err{color:rgba(255,255,255,.55)}
    .qr-ok{color:rgba(255,255,255,.8)}
    body.light .qr-err{color:rgba(0,0,0,.55)}
    body.light .qr-ok{color:rgba(0,0,0,.8)}
    .qr-loading{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.15);border-top-color:#fff;border-radius:50%;animation:qrspin .6s linear infinite;vertical-align:middle;margin-right:6px}
    body.light .qr-loading{border-color:rgba(0,0,0,.1);border-top-color:#111}
    @keyframes qrspin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>
    <div class="qr-box">
        <img src="/tokenpay-id-light.png" alt="TOKEN PAY ID" class="qr-logo">
        <div class="qr-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="3" height="3"/><path d="M21 14h-3v3h3v4h-7v-7h4"/></svg>
        </div>
        <div id="content">
            <div class="qr-title" id="title">Вход по QR-коду</div>
            <div class="qr-desc" id="desc">Загрузка...</div>
        </div>
        <div id="actions"></div>
        <div class="qr-status" id="status"></div>
    </div>
<script>
const API = '/api/v1';
const params = new URLSearchParams(window.location.search);
const sid = params.get('sid');
const _lang = localStorage.getItem('tp_lang') || (navigator.language && navigator.language.startsWith('en') ? 'en' : 'ru');
function L(ru, en) { return _lang === 'en' ? en : ru; }

const titleEl = document.getElementById('title');
const descEl = document.getElementById('desc');
const actionsEl = document.getElementById('actions');
const statusEl = document.getElementById('status');

if (!sid) {
    titleEl.textContent = L('Ошибка', 'Error');
    descEl.textContent = L('Отсутствует идентификатор сессии.', 'Missing session ID.');
    descEl.classList.add('qr-err');
} else {
    // First check session status — if pre-approved (from dashboard), auto-login
    descEl.textContent = L('Проверка...', 'Checking...');
    fetch(API + '/auth/qr/login-poll/' + sid)
        .then(r => r.json())
        .then(data => {
            if (data.status === 'approved' && data.accessToken) {
                // Pre-approved from dashboard — auto-login on this device
                autoLogin(data);
            } else if (data.status === 'expired') {
                titleEl.textContent = L('QR-код истёк', 'QR code expired');
                descEl.textContent = L('Создайте новый QR-код и попробуйте снова.', 'Generate a new QR code and try again.');
                descEl.classList.add('qr-err');
            } else {
                // Session is pending — need logged-in user to confirm
                showConfirmFlow();
            }
        }).catch(() => {
            // Network error — try confirm flow anyway
            showConfirmFlow();
        });
}

function autoLogin(data) {
    titleEl.textContent = L('Вход выполнен!', 'Logged in!');
    descEl.textContent = L('Вы вошли в аккаунт. Перенаправление...', 'You are logged in. Redirecting...');
    descEl.classList.add('qr-ok');
    statusEl.innerHTML = '✓';
    statusEl.classList.add('qr-ok');
    // Save tokens
    localStorage.setItem('tpid_token', data.accessToken);
    localStorage.setItem('tp_token', data.accessToken);
    if (data.refreshToken) localStorage.setItem('tpid_refresh', data.refreshToken);
    if (data.user) localStorage.setItem('tpid_user', JSON.stringify(data.user));
    localStorage.setItem('tpid_last_login', String(Date.now()));
    setTimeout(() => { window.location.href = '/dashboard'; }, 1200);
}

function showConfirmFlow() {
    const token = localStorage.getItem('tpid_token') || sessionStorage.getItem('tpid_token');
    if (!token) {
        titleEl.textContent = L('Войдите в аккаунт', 'Sign in first');
        descEl.textContent = L('Для подтверждения входа по QR-коду необходимо сначала войти в свой аккаунт на этом устройстве.', 'To confirm QR login, you need to sign in on this device first.');
        actionsEl.innerHTML = `<a href="/login?redirect=${encodeURIComponent('/qr-login?sid=' + sid)}" class="qr-btn qr-btn-confirm">${L('Войти', 'Sign In')}</a>`;
    } else {
        fetch(API + '/auth/verify', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token }) })
            .then(r => r.json())
            .then(d => {
                if (!d.valid) {
                    titleEl.textContent = L('Сессия истекла', 'Session expired');
                    descEl.textContent = L('Войдите заново.', 'Please sign in again.');
                    actionsEl.innerHTML = `<a href="/login?redirect=${encodeURIComponent('/qr-login?sid=' + sid)}" class="qr-btn qr-btn-confirm">${L('Войти', 'Sign In')}</a>`;
                    return;
                }
                const user = (() => { try { return JSON.parse(localStorage.getItem('tpid_user') || sessionStorage.getItem('tpid_user') || 'null'); } catch(e) { return null; } })();
                const email = user ? user.email : '';
                titleEl.textContent = L('Подтвердить вход?', 'Confirm login?');
                descEl.innerHTML = L(
                    `Другое устройство запрашивает вход в ваш аккаунт <strong>${email}</strong>. Если это не вы — нажмите «Отклонить».`,
                    `Another device is requesting to sign in to your account <strong>${email}</strong>. If this wasn't you, press "Deny".`
                );
                actionsEl.innerHTML = `
                    <button class="qr-btn qr-btn-confirm" id="confirmBtn">${L('Подтвердить вход', 'Confirm Login')}</button>
                    <button class="qr-btn qr-btn-cancel" onclick="window.close()">${L('Отклонить', 'Deny')}</button>
                `;
                document.getElementById('confirmBtn').addEventListener('click', doConfirm);
            }).catch(() => {
                descEl.textContent = L('Ошибка проверки.', 'Verification error.');
                descEl.classList.add('qr-err');
            });
    }
}

async function doConfirm() {
    const btn = document.getElementById('confirmBtn');
    btn.disabled = true;
    btn.innerHTML = `<span class="qr-loading"></span>${L('Подтверждение...', 'Confirming...')}`;
    const token = localStorage.getItem('tpid_token') || sessionStorage.getItem('tpid_token');
    try {
        const res = await fetch(API + '/auth/qr/login-confirm/' + sid, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        if (res.ok && data.success) {
            titleEl.textContent = L('Вход подтверждён', 'Login confirmed');
            descEl.textContent = L('Можете закрыть эту страницу. Вход на другом устройстве выполнен.', 'You can close this page. Login on the other device is complete.');
            descEl.classList.add('qr-ok');
            actionsEl.innerHTML = '';
            statusEl.innerHTML = '✓';
            statusEl.classList.add('qr-ok');
        } else {
            const msg = data.error?.message || L('Ошибка', 'Error');
            statusEl.textContent = msg;
            statusEl.classList.add('qr-err');
            btn.disabled = false;
            btn.textContent = L('Подтвердить вход', 'Confirm Login');
        }
    } catch(e) {
        statusEl.textContent = L('Ошибка сети', 'Network error');
        statusEl.classList.add('qr-err');
        btn.disabled = false;
        btn.textContent = L('Подтвердить вход', 'Confirm Login');
    }
}
</script>
</body>
</html>
