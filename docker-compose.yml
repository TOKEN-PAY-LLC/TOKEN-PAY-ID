version: '3.8'

services:
  api:
    build: ./backend
    container_name: tokenpay-id-api
    restart: unless-stopped
    environment:
      - PORT=8080
      - DB_HOST=5.23.55.152
      - DB_PORT=5432
      - DB_NAME=default_db
      - DB_USER=gen_user
      - DB_PASSWORD=93JJFQLAYC=Uo)
      - JWT_SECRET=${JWT_SECRET:-tpid_jwt_production_secret_2026}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-tpid_refresh_production_secret_2026}
      - ADMIN_EMAIL=info@tokenpay.space
      - ADMIN_PASSWORD=Zdcgbjm812.
      - CORS_ORIGIN=https://tokenpay.space
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@tokenpay.space}
    networks:
      - tokenpay-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: tokenpay-id-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - tokenpay-net

networks:
  tokenpay-net:
    driver: bridge
