<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Авторизация — TOKEN PAY ID</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Comfortaa', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .consent-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 20px;
            padding: 40px;
            max-width: 440px;
            width: 100%;
            text-align: center;
        }
        .consent-logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 20px;
        }
        .consent-logo img { width: 100%; height: 100%; object-fit: contain; }
        .consent-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
        }
        .consent-subtitle {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 28px;
        }
        .consent-app {
            background: #0d0d0d;
            border: 1px solid #1a1a1a;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
        }
        .consent-app-name {
            font-size: 1.05rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
        }
        .consent-app-owner {
            font-size: 0.8rem;
            color: #666;
        }
        .consent-scope {
            text-align: left;
            margin-bottom: 28px;
        }
        .consent-scope-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        .consent-scope-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            font-size: 0.85rem;
            color: #ccc;
        }
        .consent-scope-item svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            color: #4ade80;
        }
        .consent-actions {
            display: flex;
            gap: 12px;
        }
        .consent-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-family: 'Comfortaa', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .consent-btn-deny {
            background: #1a1a1a;
            color: #999;
            border: 1px solid #333;
        }
        .consent-btn-deny:hover { background: #222; color: #fff; }
        .consent-btn-allow {
            background: #fff;
            color: #000;
        }
        .consent-btn-allow:hover { background: #e0e0e0; }
        .consent-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .consent-login-notice {
            margin-top: 16px;
            font-size: 0.78rem;
            color: #666;
        }
        .consent-login-notice a {
            color: #aaa;
            text-decoration: underline;
        }
        .consent-error {
            background: #1a0505;
            border: 1px solid #3a0a0a;
            border-radius: 10px;
            padding: 14px;
            color: #f87171;
            font-size: 0.85rem;
            margin-bottom: 16px;
            display: none;
        }
        .consent-user {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #0d0d0d;
            border: 1px solid #1a1a1a;
            border-radius: 10px;
            padding: 10px 14px;
            margin-bottom: 20px;
        }
        .consent-user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            color: #fff;
        }
        .consent-user-info { text-align: left; }
        .consent-user-name { font-size: 0.85rem; font-weight: 600; color: #fff; }
        .consent-user-email { font-size: 0.75rem; color: #666; }

        /* Light theme */
        body.light { background: #f5f5f7; color: #333; }
        body.light .consent-card { background: #fff; border-color: rgba(0,0,0,.08); box-shadow: 0 2px 12px rgba(0,0,0,.06); }
        body.light .consent-title { color: #111; }
        body.light .consent-subtitle { color: #888; }
        body.light .consent-app { background: #f8f8fa; border-color: rgba(0,0,0,.06); }
        body.light .consent-app-name { color: #111; }
        body.light .consent-app-owner { color: #888; }
        body.light .consent-scope-title { color: #888; }
        body.light .consent-scope-item { color: #555; }
        body.light .consent-scope-item svg { color: #16a34a; }
        body.light .consent-btn-deny { background: rgba(0,0,0,.04); color: #666; border-color: rgba(0,0,0,.1); }
        body.light .consent-btn-deny:hover { background: rgba(0,0,0,.08); color: #111; }
        body.light .consent-btn-allow { background: #111; color: #fff; }
        body.light .consent-btn-allow:hover { background: #222; }
        body.light .consent-error { background: rgba(239,68,68,.04); border-color: rgba(239,68,68,.12); color: #dc2626; }
        body.light .consent-user { background: #f8f8fa; border-color: rgba(0,0,0,.06); }
        body.light .consent-user-avatar { background: rgba(0,0,0,.06); color: #111; }
        body.light .consent-user-name { color: #111; }
        body.light .consent-user-email { color: #888; }
        body.light .consent-login-notice { color: #888; }
        body.light .consent-login-notice a { color: #555; }
        body.light .consent-logo img { filter: invert(1) brightness(.15); }

        @media(max-width:480px) {
            .consent-card { padding: 28px 24px; border-radius: 16px; }
            .consent-title { font-size: 1.1rem; }
        }
    </style>
    <script src="theme-init.js?v=20260316b"></script>
</head>
<body>
    <div class="consent-card">
        <div class="consent-logo">
            <img src="tokenpay-logo.png" alt="TOKEN PAY">
        </div>
        <div class="consent-title">Вход через TOKEN PAY</div>
        <div class="consent-subtitle">Приложение запрашивает доступ к вашему аккаунту</div>

        <div class="consent-error" id="errorBox"></div>

        <div class="consent-user" id="userBox" style="display:none">
            <div class="consent-user-avatar" id="userAvatar">—</div>
            <div class="consent-user-info">
                <div class="consent-user-name" id="userName"></div>
                <div class="consent-user-email" id="userEmail"></div>
            </div>
        </div>

        <div class="consent-app">
            <div class="consent-app-name" id="appName">Загрузка...</div>
            <div class="consent-app-owner" id="appOwner"></div>
        </div>

        <div class="consent-scope">
            <div class="consent-scope-title">Запрашиваемые разрешения</div>
            <div class="consent-scope-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                Имя и email
            </div>
            <div class="consent-scope-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                Статус верификации
            </div>
        </div>

        <div class="consent-actions">
            <button class="consent-btn consent-btn-deny" id="denyBtn" onclick="deny()">Отклонить</button>
            <button class="consent-btn consent-btn-allow" id="allowBtn" onclick="approve()">Разрешить</button>
        </div>

        <div class="consent-login-notice" id="loginNotice">
            Нет аккаунта? <a id="registerLink" href="/register">Зарегистрируйтесь</a>
        </div>
    </div>

    <script>
        const API = '/api/v1';
        const params = new URLSearchParams(window.location.search);
        const clientId = params.get('client_id');
        const redirectUri = params.get('redirect_uri');
        const scope = params.get('scope') || 'profile';
        const state = params.get('state') || '';
        const appName = params.get('app_name') || 'Unknown App';
        const ownerName = params.get('owner_name') || '';
        const appIcon = params.get('app_icon') || '';
        const appDesc = params.get('app_desc') || '';
        const codeChallenge = params.get('code_challenge') || '';
        const codeChallengeMethod = params.get('code_challenge_method') || '';
        const promptParam = params.get('prompt') || '';
        const loginHint = params.get('login_hint') || '';
        const isPopup = !!(window.opener && window.opener !== window);

        // prompt=login → force re-authentication (fixes admin account bug)
        if (promptParam === 'login') {
            localStorage.removeItem('tp_token');
            localStorage.removeItem('tpid_token');
            sessionStorage.removeItem('tpid_token');
            // Remove prompt=login from URL to avoid infinite redirect loop
            const cleanParams = new URLSearchParams(window.location.search);
            cleanParams.delete('prompt');
            const cleanUrl = window.location.pathname + '?' + cleanParams.toString();
            history.replaceState(null, '', cleanUrl);
        }

        // i18n
        const _lang = (localStorage.getItem('tp_lang') || navigator.language || 'ru').substring(0, 2);
        function L(ru, en) { return _lang === 'en' ? en : ru; }
        document.title = L('Авторизация — TOKEN PAY ID', 'Authorization — TOKEN PAY ID');

        // Populate app info
        document.getElementById('appName').textContent = appName;
        document.getElementById('appOwner').textContent = ownerName ? L(`от ${ownerName}`, `by ${ownerName}`) : '';
        document.querySelector('.consent-title').textContent = L('Вход через TOKEN PAY ID', 'Sign in with TOKEN PAY ID');
        document.querySelector('.consent-subtitle').textContent = L('Приложение запрашивает доступ к вашему аккаунту', 'Application requests access to your account');
        document.getElementById('denyBtn').textContent = L('Отклонить', 'Deny');
        document.getElementById('allowBtn').textContent = L('Разрешить', 'Allow');

        // Register link with redirect
        const regLink = document.getElementById('registerLink');
        regLink.href = '/register?redirect=' + encodeURIComponent(window.location.href);
        regLink.textContent = L('Зарегистрируйтесь', 'Sign up');
        document.getElementById('loginNotice').firstChild.textContent = L('Нет аккаунта? ', 'No account? ');

        // App icon (if provided) — sanitize to prevent XSS
        if (appIcon && /^https?:\/\//.test(appIcon)) {
            const logoEl = document.querySelector('.consent-logo');
            const iconImg = document.createElement('img');
            iconImg.src = appIcon;
            iconImg.alt = appName.replace(/[<>"'&]/g, '');
            iconImg.onerror = function() { this.parentElement.innerHTML = '<img src="tokenpay-logo.png" alt="TOKEN PAY">'; };
            iconImg.style.cssText = 'width:100%;height:100%;object-fit:contain';
            logoEl.innerHTML = '';
            logoEl.appendChild(iconImg);
        }

        // Dynamic scopes
        const SCOPE_MAP = {
            profile:  { icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>', ru: 'Имя и email', en: 'Name and email' },
            email:    { icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="3"/><path d="M22 7l-10 7L2 7"/></svg>', ru: 'Email адрес', en: 'Email address' },
            openid:   { icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>', ru: 'Статус верификации', en: 'Verification status' },
        };
        const scopeContainer = document.querySelector('.consent-scope');
        const scopeTitle = document.querySelector('.consent-scope-title');
        scopeTitle.textContent = L('Запрашиваемые разрешения', 'Requested permissions');
        // Clear hardcoded scopes and render dynamically
        scopeContainer.querySelectorAll('.consent-scope-item').forEach(el => el.remove());
        const scopes = scope.split(/[\s,]+/).filter(Boolean);
        const rendered = new Set();
        scopes.forEach(s => {
            const key = s.toLowerCase();
            if (rendered.has(key)) return;
            rendered.add(key);
            const info = SCOPE_MAP[key] || { icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>', ru: key, en: key };
            const div = document.createElement('div');
            div.className = 'consent-scope-item';
            div.innerHTML = info.icon + ' ' + L(info.ru, info.en);
            scopeContainer.appendChild(div);
        });
        // Always show profile if not explicitly listed
        if (!rendered.has('profile')) {
            const info = SCOPE_MAP.profile;
            const div = document.createElement('div');
            div.className = 'consent-scope-item';
            div.innerHTML = info.icon + ' ' + L(info.ru, info.en);
            scopeContainer.insertBefore(div, scopeTitle.nextSibling);
        }

        // Token — check both tp_token and tpid_token for consistency
        let token = localStorage.getItem('tp_token') || localStorage.getItem('tpid_token') || sessionStorage.getItem('tpid_token');

        function showError(msg) {
            const box = document.getElementById('errorBox');
            box.textContent = msg;
            box.style.display = 'block';
        }

        function _loginRedirect() {
            const returnUrl = encodeURIComponent(window.location.href);
            let loginUrl = `login?isOAuth=true&redirect=${returnUrl}`;
            if (loginHint) loginUrl += '&login_hint=' + encodeURIComponent(loginHint);
            window.location.href = loginUrl;
        }

        function _switchAccountUrl() {
            const returnUrl = encodeURIComponent(window.location.href);
            return `login?isOAuth=true&force=1&redirect=${returnUrl}`;
        }

        async function loadUser() {
            if (!token) {
                _loginRedirect();
                return;
            }
            try {
                const resp = await fetch(`${API}/users/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!resp.ok) {
                    localStorage.removeItem('tp_token');
                    localStorage.removeItem('tpid_token');
                    sessionStorage.removeItem('tpid_token');
                    token = null;
                    _loginRedirect();
                    return;
                }
                const user = await resp.json();
                // Security: if login_hint is set, verify the loaded user matches
                if (loginHint && user.email && user.email.toLowerCase() !== loginHint.toLowerCase()) {
                    // Wrong user loaded (e.g. admin token cached) — force re-login
                    localStorage.removeItem('tp_token');
                    localStorage.removeItem('tpid_token');
                    sessionStorage.removeItem('tpid_token');
                    token = null;
                    _loginRedirect();
                    return;
                }
                document.getElementById('userBox').style.display = 'flex';
                document.getElementById('userAvatar').textContent = (user.name || '?')[0].toUpperCase();
                document.getElementById('userName').textContent = user.name;
                document.getElementById('userEmail').textContent = user.email;
                document.getElementById('loginNotice').innerHTML =
                    L(`Не вы? <a href="${_switchAccountUrl()}">Сменить аккаунт</a>`,
                      `Not you? <a href="${_switchAccountUrl()}">Switch account</a>`);
            } catch (e) {
                showError(L('Ошибка загрузки профиля', 'Failed to load profile'));
            }
        }

        async function approve() {
            _flowCompleted = true;
            const btn = document.getElementById('allowBtn');
            btn.disabled = true;
            btn.textContent = L('Авторизация...', 'Authorizing...');
            try {
                const resp = await fetch(`${API}/oauth/approve`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(Object.assign(
                        { client_id: clientId, redirect_uri: redirectUri, scope, state },
                        codeChallenge ? { code_challenge: codeChallenge, code_challenge_method: codeChallengeMethod || 'S256' } : {}
                    ))
                });
                const data = await resp.json();
                if (!resp.ok) {
                    showError(data.error?.message || L('Ошибка авторизации', 'Authorization error'));
                    btn.disabled = false;
                    btn.textContent = L('Разрешить', 'Allow');
                    return;
                }
                if (isPopup) {
                    try {
                        const url = new URL(data.redirect_url);
                        window.opener.postMessage({ type: 'tpid_oauth_code', code: url.searchParams.get('code'), state: url.searchParams.get('state') }, '*');
                    } catch(e) {
                        window.opener.postMessage({ type: 'tpid_oauth_code', redirect_url: data.redirect_url }, '*');
                    }
                    window.close();
                    return;
                }
                window.location.href = data.redirect_url;
            } catch (e) {
                showError(L('Ошибка сети', 'Network error'));
                btn.disabled = false;
                btn.textContent = L('Разрешить', 'Allow');
            }
        }

        let _flowCompleted = false;

        async function deny() {
            _flowCompleted = true;
            // Notify server so enterprise gets webhook
            try {
                await fetch(`${API}/oauth/deny`, {
                    method: 'POST',
                    headers: Object.assign(
                        { 'Content-Type': 'application/json' },
                        token ? { 'Authorization': `Bearer ${token}` } : {}
                    ),
                    body: JSON.stringify({ client_id: clientId, state })
                });
            } catch (e) { /* best-effort */ }
            if (isPopup) {
                window.opener.postMessage({ type: 'tpid_oauth_code', error: 'access_denied', state }, '*');
                window.close();
                return;
            }
            if (redirectUri) {
                const url = new URL(redirectUri);
                url.searchParams.set('error', 'access_denied');
                url.searchParams.set('error_description', 'User denied the request');
                if (state) url.searchParams.set('state', state);
                window.location.href = url.toString();
            } else {
                window.location.href = '/';
            }
        }

        // Fire cancel when user closes the window without approving/denying
        window.addEventListener('beforeunload', function() {
            if (_flowCompleted) return;
            // Use sendBeacon for reliable delivery on page close
            if (navigator.sendBeacon && clientId) {
                navigator.sendBeacon(
                    `${API}/oauth/cancel`,
                    new Blob([JSON.stringify({ client_id: clientId, state, reason: 'window_closed' })], { type: 'application/json' })
                );
            }
        });

        loadUser();
    </script>
</body>
</html>
