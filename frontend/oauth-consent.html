<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Авторизация — TOKEN PAY ID</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="favicon.ico?v=6">
    <link rel="icon" type="image/png" sizes="32x32" href="icon-192.png?v=6">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png?v=6">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png?v=6">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=6">
    <link rel="manifest" href="manifest.json?v=6">
    <meta name="theme-color" content="#000000">
    <link rel="stylesheet" href="styles.css?v=20260327c">
    <script src="theme-init.js?v=20260327c"></script>
    <style>
        .consent-body { text-align:left; }
        .consent-subtitle { font-size:.82rem; color:rgba(255,255,255,.45); text-align:center; margin-bottom:22px; line-height:1.5; }
        .consent-error { background:rgba(230,60,60,.06); border:1px solid rgba(230,60,60,.15); border-radius:10px; padding:12px 14px; color:rgba(230,80,80,.9); font-size:.82rem; margin-bottom:16px; display:none; }
        .consent-user { display:flex; align-items:center; gap:12px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); border-radius:12px; padding:12px 14px; margin-bottom:14px; }
        .consent-user-avatar { width:36px; height:36px; border-radius:10px; background:rgba(255,255,255,.1); display:flex; align-items:center; justify-content:center; font-size:.82rem; font-weight:700; color:rgba(255,255,255,.7); flex-shrink:0; }
        .consent-user-info { flex:1; min-width:0; text-align:left; }
        .consent-user-name { font-size:.86rem; font-weight:600; color:#fff; }
        .consent-user-email { font-size:.73rem; color:rgba(255,255,255,.4); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .consent-app { background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.08); border-left:3px solid rgba(255,255,255,.25); border-radius:0 12px 12px 0; padding:12px 16px; margin-bottom:20px; }
        .consent-app-label { font-size:.6rem; text-transform:uppercase; letter-spacing:1.8px; color:rgba(255,255,255,.25); font-weight:700; margin-bottom:5px; }
        .consent-app-name { font-size:.98rem; font-weight:600; color:#fff; margin-bottom:2px; }
        .consent-app-owner { font-size:.75rem; color:rgba(255,255,255,.35); }
        .consent-scope { margin-bottom:24px; }
        .consent-scope-title { font-size:.62rem; font-weight:700; color:rgba(255,255,255,.25); text-transform:uppercase; letter-spacing:1.8px; margin-bottom:10px; }
        .consent-scope-item { display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:9px; font-size:.83rem; color:rgba(255,255,255,.6); background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.06); margin-bottom:6px; }
        .consent-scope-item:last-child { margin-bottom:0; }
        .consent-scope-item svg { width:16px; height:16px; flex-shrink:0; color:rgba(255,255,255,.45); }
        .consent-actions { display:flex; gap:10px; margin-bottom:16px; }
        .consent-btn { flex:1; padding:14px 16px; border:none; border-radius:12px; font-family:'Comfortaa',sans-serif; font-size:.88rem; font-weight:700; cursor:pointer; transition:all .2s cubic-bezier(.4,0,.2,1); position:relative; overflow:hidden; }
        .consent-btn:active { transform:scale(.97); }
        .consent-btn:disabled { opacity:.4; cursor:not-allowed; transform:none!important; }
        .consent-btn-deny { background:rgba(255,255,255,.05); color:rgba(255,255,255,.5); border:1px solid rgba(255,255,255,.1); }
        .consent-btn-deny:hover:not(:disabled) { background:rgba(255,255,255,.09); color:rgba(255,255,255,.8); border-color:rgba(255,255,255,.18); }
        .consent-btn-allow { background:#fff; color:#000; box-shadow:0 4px 20px rgba(255,255,255,.08); }
        .consent-btn-allow::before { content:''; position:absolute; top:50%; left:50%; width:0; height:0; border-radius:50%; background:rgba(0,0,0,.06); transform:translate(-50%,-50%); transition:width .5s,height .5s; }
        .consent-btn-allow:hover::before { width:280px; height:280px; }
        .consent-btn-allow:hover:not(:disabled) { background:#e8e8e8; transform:translateY(-1px); box-shadow:0 8px 32px rgba(255,255,255,.12); }
        .consent-login-notice { text-align:center; font-size:.76rem; color:rgba(255,255,255,.3); }
        .consent-login-notice a { color:#fff; font-weight:600; text-decoration:none; border-bottom:1px solid rgba(255,255,255,.15); padding-bottom:1px; transition:all .2s; }
        .consent-login-notice a:hover { border-color:rgba(255,255,255,.5); }
        .consent-loading { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 28px; gap:14px; }
        .consent-spinner { width:22px; height:22px; border:2px solid rgba(255,255,255,.1); border-top-color:#fff; border-radius:50%; animation:spin .6s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .consent-loading-text { font-size:.8rem; color:rgba(255,255,255,.3); }
        /* Light theme overrides */
        body.light .consent-subtitle { color:rgba(0,0,0,.45); }
        body.light .consent-user { background:rgba(0,0,0,.03); border-color:rgba(0,0,0,.08); }
        body.light .consent-user-avatar { background:rgba(0,0,0,.08); color:rgba(0,0,0,.6); }
        body.light .consent-user-name { color:#111; }
        body.light .consent-user-email { color:rgba(0,0,0,.4); }
        body.light .consent-app { background:rgba(0,0,0,.02); border-color:rgba(0,0,0,.06); border-left-color:rgba(0,0,0,.2); }
        body.light .consent-app-label { color:rgba(0,0,0,.3); }
        body.light .consent-app-name { color:#111; }
        body.light .consent-app-owner { color:rgba(0,0,0,.4); }
        body.light .consent-scope-title { color:rgba(0,0,0,.3); }
        body.light .consent-scope-item { background:rgba(0,0,0,.02); border-color:rgba(0,0,0,.06); color:rgba(0,0,0,.55); }
        body.light .consent-scope-item svg { color:rgba(0,0,0,.4); }
        body.light .consent-btn-deny { background:rgba(0,0,0,.04); color:rgba(0,0,0,.5); border-color:rgba(0,0,0,.1); }
        body.light .consent-btn-deny:hover:not(:disabled) { background:rgba(0,0,0,.08); color:rgba(0,0,0,.7); }
        body.light .consent-btn-allow { background:#111; color:#fff; box-shadow:0 4px 20px rgba(0,0,0,.1); }
        body.light .consent-btn-allow:hover:not(:disabled) { background:#222; box-shadow:0 8px 32px rgba(0,0,0,.15); }
        body.light .consent-btn-allow::before { background:rgba(255,255,255,.08); }
        body.light .consent-error { background:rgba(230,60,60,.04); border-color:rgba(230,60,60,.12); color:#d44; }
        body.light .consent-login-notice { color:rgba(0,0,0,.35); }
        body.light .consent-login-notice a { color:#111; border-color:rgba(0,0,0,.15); }
        body.light .consent-login-notice a:hover { border-color:rgba(0,0,0,.4); }
        body.light .consent-loading-text { color:rgba(0,0,0,.35); }
        body.light .consent-spinner { border-color:rgba(0,0,0,.1); border-top-color:#111; }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>

    <div class="auth-page">
        <div class="auth-container fade-in">
            <div class="auth-card">
                <div class="auth-card-logo">
                    <a href="/"><img src="tokenpay-id-light.png" alt="TOKEN PAY ID" class="tpid-logo"></a>
                </div>
                <p style="text-align:center;font-size:.88rem;color:rgba(255,255,255,.55);margin-bottom:24px" data-ru="Вход через TOKEN PAY ID" data-en="Sign in with TOKEN PAY ID">Вход через TOKEN PAY ID</p>
                <div class="consent-body" id="consentBody">
                    <div class="consent-loading" id="loadingState">
                        <div class="consent-spinner"></div>
                        <div class="consent-loading-text">Проверка авторизации...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js?v=20260327c"></script>
    <script>
        const API = '/api/v1';
        const params = new URLSearchParams(window.location.search);
        const clientId = params.get('client_id');
        const redirectUri = params.get('redirect_uri');
        const scope = params.get('scope') || 'profile';
        const state = params.get('state') || '';
        // Filter generic API key names — show raw value only if it's a real app name
        const _rawAppName = params.get('app_name') || '';
        const _GENERIC = ['default key','default','production key','api key','main key','тест','test','my key','новый ключ','ключ','key','новый'];
        const appName = (_rawAppName && !_GENERIC.includes(_rawAppName.toLowerCase())) ? _rawAppName : (_rawAppName || 'Приложение');
        const ownerName = params.get('owner_name') || '';
        const appIcon = params.get('app_icon') || '';
        const appDesc = params.get('app_desc') || '';
        const clientUri = params.get('client_uri') || '';
        const tosUri = params.get('tos_uri') || '';
        const policyUri = params.get('policy_uri') || '';
        const codeChallenge = params.get('code_challenge') || '';
        const codeChallengeMethod = params.get('code_challenge_method') || '';
        const promptParam = params.get('prompt') || '';
        const loginHint = params.get('login_hint') || '';
        const isPopup = !!(window.opener && window.opener !== window);

        // prompt=login → force re-authentication (fixes cached admin token bug)
        if (promptParam === 'login') {
            localStorage.removeItem('tp_token');
            localStorage.removeItem('tpid_token');
            sessionStorage.removeItem('tpid_token');
            const cleanParams = new URLSearchParams(window.location.search);
            cleanParams.delete('prompt');
            history.replaceState(null, '', window.location.pathname + '?' + cleanParams.toString());
        }

        const _lang = (localStorage.getItem('tp_lang') || navigator.language || 'ru').substring(0, 2);
        function L(ru, en) { return _lang === 'en' ? en : ru; }
        document.title = L('Авторизация — TOKEN PAY ID', 'Authorization — TOKEN PAY ID');

        let token = localStorage.getItem('tp_token') || localStorage.getItem('tpid_token') || sessionStorage.getItem('tpid_token');
        let _flowCompleted = false;

        const SCOPE_MAP = {
            profile: { icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>', ru: 'Имя и email', en: 'Name and email' },
            email:   { icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="3"/><path d="M22 7l-10 7L2 7"/></svg>', ru: 'Email адрес', en: 'Email address' },
            openid:  { icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>', ru: 'Статус верификации', en: 'Verification status' },
        };

        function _e(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

        function _buildBody(user) {
            const scopes = scope.split(/[\s,]+/).filter(Boolean);
            const rendered = new Set();
            if (!scopes.includes('profile')) scopes.unshift('profile');
            const scopeItems = scopes.map(s => {
                const key = s.toLowerCase();
                if (rendered.has(key)) return '';
                rendered.add(key);
                const info = SCOPE_MAP[key] || { icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>', ru: key, en: key };
                return `<div class="consent-scope-item">${info.icon}<span>${L(info.ru, info.en)}</span></div>`;
            }).join('');

            const appOwnerText = ownerName ? L(`от ${ownerName}`, `by ${ownerName}`) : '';
            const switchUrl = `login?isOAuth=true&force=1&redirect=${encodeURIComponent(window.location.href)}`;
            const regUrl = '/register?redirect=' + encodeURIComponent(window.location.href);
            const noticeHtml = user
                ? L(`Не вы? <a href="${switchUrl}">Сменить аккаунт</a>`, `Not you? <a href="${switchUrl}">Switch account</a>`)
                : `${L('Нет аккаунта? ', 'No account? ')}<a href="${regUrl}">${L('Зарегистрируйтесь', 'Sign up')}</a>`;

            const userHtml = user ? `
                <div class="consent-user">
                    <div class="consent-user-avatar">${_e((user.name || '?')[0].toUpperCase())}</div>
                    <div class="consent-user-info">
                        <div class="consent-user-name">${_e(user.name || '')}</div>
                        <div class="consent-user-email">${_e(user.email || '')}</div>
                    </div>
                </div>` : '';

            document.getElementById('consentBody').innerHTML = `
                <div class="consent-subtitle">${L('Приложение запрашивает доступ к вашему аккаунту', 'Application requests access to your account')}</div>
                <div class="consent-error" id="errorBox" style="display:none"></div>
                ${userHtml}
                <div class="consent-app">
                    <div class="consent-app-label">${L('ЗАПРАШИВАЕТ ДОСТУП', 'REQUESTS ACCESS')}</div>
                    <div class="consent-app-name" id="appName">${clientUri ? `<a href="${_e(clientUri)}" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;border-bottom:1px solid rgba(255,255,255,.15)">${_e(appName)}</a>` : _e(appName)}</div>
                    ${appOwnerText ? `<div class="consent-app-owner" id="appOwner">${_e(appOwnerText)}</div>` : ''}
                    ${appDesc ? `<div style="font-size:.75rem;color:rgba(255,255,255,.35);margin-top:4px">${_e(appDesc)}</div>` : ''}
                </div>
                <div class="consent-scope">
                    <div class="consent-scope-title">${L('Запрашиваемые разрешения', 'Requested permissions')}</div>
                    ${scopeItems}
                </div>
                <div class="consent-actions">
                    <button class="consent-btn consent-btn-deny" id="denyBtn" onclick="deny()">${L('Отклонить', 'Deny')}</button>
                    <button class="consent-btn consent-btn-allow" id="allowBtn" onclick="approve()">${L('Разрешить', 'Allow')}</button>
                </div>
                ${(tosUri || policyUri) ? `<div style="text-align:center;font-size:.7rem;color:rgba(255,255,255,.3);margin-bottom:12px">
                    ${tosUri ? `<a href="${_e(tosUri)}" target="_blank" rel="noopener" style="color:rgba(255,255,255,.5);text-decoration:underline">${L('Условия','Terms')}</a>` : ''}
                    ${tosUri && policyUri ? ' · ' : ''}
                    ${policyUri ? `<a href="${_e(policyUri)}" target="_blank" rel="noopener" style="color:rgba(255,255,255,.5);text-decoration:underline">${L('Конфиденциальность','Privacy')}</a>` : ''}
                </div>` : ''}
                <div class="consent-login-notice" id="loginNotice">${noticeHtml}</div>`;

            // Replace logo with app icon if provided and valid
            if (appIcon && /^https?:\/\//.test(appIcon)) {
                const logoEl = document.querySelector('.auth-card-logo');
                if (logoEl) {
                    const img = new Image();
                    img.onload = function() {
                        img.style.cssText = 'width:56px;height:56px;object-fit:contain;border-radius:14px;pointer-events:none';
                        logoEl.innerHTML = ''; logoEl.style.textAlign = 'center'; logoEl.appendChild(img);
                    };
                    img.src = appIcon;
                }
            }
        }

        function showError(msg) {
            const box = document.getElementById('errorBox');
            if (box) { box.textContent = msg; box.style.display = 'block'; }
        }

        function _loginRedirect() {
            const returnUrl = encodeURIComponent(window.location.href);
            let loginUrl = `login?isOAuth=true&redirect=${returnUrl}`;
            if (loginHint) loginUrl += '&login_hint=' + encodeURIComponent(loginHint);
            window.location.href = loginUrl;
        }

        async function loadUser() {
            if (!token) { _loginRedirect(); return; }
            try {
                const resp = await fetch(`${API}/users/me`, { headers: { 'Authorization': `Bearer ${token}` } });
                if (!resp.ok) {
                    localStorage.removeItem('tp_token'); localStorage.removeItem('tpid_token'); sessionStorage.removeItem('tpid_token');
                    token = null; _loginRedirect(); return;
                }
                const user = await resp.json();
                // Security: if login_hint provided, verify correct user (prevents admin token leaking to OAuth)
                if (loginHint && user.email && user.email.toLowerCase() !== loginHint.toLowerCase()) {
                    localStorage.removeItem('tp_token'); localStorage.removeItem('tpid_token'); sessionStorage.removeItem('tpid_token');
                    token = null; _loginRedirect(); return;
                }
                _buildBody(user);
            } catch (e) {
                _buildBody(null);
                showError(L('Ошибка загрузки профиля', 'Failed to load profile'));
            }
        }

        async function approve() {
            _flowCompleted = true;
            const btn = document.getElementById('allowBtn');
            btn.disabled = true; btn.textContent = L('Авторизация...', 'Authorizing...');
            try {
                const resp = await fetch(`${API}/oauth/approve`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(Object.assign(
                        { client_id: clientId, redirect_uri: redirectUri, scope, state },
                        codeChallenge ? { code_challenge: codeChallenge, code_challenge_method: codeChallengeMethod || 'S256' } : {}
                    ))
                });
                const data = await resp.json();
                if (!resp.ok) {
                    showError(data.error?.message || L('Ошибка авторизации', 'Authorization error'));
                    btn.disabled = false; btn.textContent = L('Разрешить', 'Allow'); return;
                }
                if (isPopup) {
                    try {
                        const url = new URL(data.redirect_url);
                        window.opener.postMessage({ type: 'tpid_oauth_code', code: url.searchParams.get('code'), state: url.searchParams.get('state') }, '*');
                    } catch(e) {
                        window.opener.postMessage({ type: 'tpid_oauth_code', redirect_url: data.redirect_url }, '*');
                    }
                    window.close(); return;
                }
                window.location.href = data.redirect_url;
            } catch (e) {
                showError(L('Ошибка сети', 'Network error'));
                btn.disabled = false; btn.textContent = L('Разрешить', 'Allow');
            }
        }

        async function deny() {
            _flowCompleted = true;
            try {
                await fetch(`${API}/oauth/deny`, {
                    method: 'POST',
                    headers: Object.assign({ 'Content-Type': 'application/json' }, token ? { 'Authorization': `Bearer ${token}` } : {}),
                    body: JSON.stringify({ client_id: clientId, state })
                });
            } catch (e) { /* best-effort */ }
            if (isPopup) {
                window.opener.postMessage({ type: 'tpid_oauth_code', error: 'access_denied', state }, '*');
                window.close(); return;
            }
            if (redirectUri) {
                const url = new URL(redirectUri);
                url.searchParams.set('error', 'access_denied');
                url.searchParams.set('error_description', 'User denied the request');
                if (state) url.searchParams.set('state', state);
                window.location.href = url.toString();
            } else { window.location.href = '/'; }
        }

        window.addEventListener('beforeunload', function() {
            if (_flowCompleted) return;
            if (navigator.sendBeacon && clientId) {
                navigator.sendBeacon(`${API}/oauth/cancel`,
                    new Blob([JSON.stringify({ client_id: clientId, state, reason: 'window_closed' })], { type: 'application/json' }));
            }
        });

        loadUser();
    </script>
</body>
</html>
